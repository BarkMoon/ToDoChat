<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ToDoChat</title>
<style>
  :root {
    --bg: #0f1115; --panel: #1a1d24; --panel2: #232733; --code: #0e1117;
    --text: #e6e8ec; --muted: #9aa1ad; --accent: #6ea8fe; --user: #2b3a55;
    --border: #2a2e38;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Segoe UI", "Yu Gothic UI", system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px; background: var(--panel); flex-wrap: wrap;
  }
  header .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex: none; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; flex: none; }
  header .ver { font-size: 11px; color: var(--muted, #888); flex: none; opacity: .8; font-variant-numeric: tabular-nums; }
  .projwrap { display: flex; align-items: center; gap: 6px; }
  .projwrap .lbl { font-size: 12px; color: var(--muted); }
  select#proj {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 8px; font: inherit; font-size: 13px; max-width: 40vw;
  }
  .iconbtn {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; width: 30px; height: 30px; font-size: 15px; cursor: pointer; line-height: 1; padding: 0;
  }
  .iconbtn:hover { border-color: var(--accent); }
  .iconbtn.quit { color: #ffb4bb; }
  .iconbtn.quit:hover { border-color: #f85149; background: #3a1f24; }
  .spacer { flex: 1; }
  .status { font-size: 12px; color: var(--muted); min-width: 56px; text-align: right; }

  /* permission-mode selector */
  .modewrap { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  select#mode {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 5px 8px; font: inherit; font-size: 12px; cursor: pointer;
  }
  select#mode.edit { color: #ffd479; border-color: #7a5a1a; }
  select#mode.confirm { color: #7ee0a0; border-color: #2f7a4a; }

  /* auto-remember-on-close toggle */
  .pilltoggle {
    background: var(--panel2); color: var(--muted); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 11px; font: inherit; font-size: 12px;
    cursor: pointer; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;
  }
  .pilltoggle:hover { border-color: var(--accent); }
  .pilltoggle:disabled { opacity: .5; cursor: default; }
  .pilltoggle .sw {
    font-weight: 700; font-size: 11px; letter-spacing: .5px;
    border-radius: 999px; padding: 1px 7px; background: var(--code); border: 1px solid var(--border);
  }
  .pilltoggle.on { color: #7ee0a0; border-color: #2f7a4a; background: #14251b; }
  .pilltoggle.on .sw { color: #08111f; background: #7ee0a0; border-color: #7ee0a0; }
  .denials {
    align-self: flex-start; max-width: 90%; font-size: 12px; color: #ffb4bb;
    background: #3a1f24; border: 1px solid #5a2a30; border-radius: 8px; padding: 6px 10px;
  }

  /* per-command approval card (confirm mode) */
  .perm-card {
    align-self: stretch; max-width: 92%; margin: 2px 0;
    background: #211b0e; border: 1px solid #7a5a1a; border-radius: 10px; padding: 12px 14px;
  }
  .perm-head { font-size: 13px; font-weight: 600; color: #ffd479; margin-bottom: 8px; }
  .perm-desc {
    font-size: 12.5px; line-height: 1.5; color: #e6d9b8; margin: 0 0 8px;
    padding-left: 8px; border-left: 2px solid #7a5a1a;
  }
  .perm-desc b { color: #ffd479; font-weight: 600; }
  .perm-cmd {
    background: var(--code); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; margin: 0 0 10px; font-family: Consolas, "Courier New", monospace;
    font-size: 13px; color: var(--text); white-space: pre-wrap; word-break: break-all; max-height: 180px; overflow-y: auto;
  }
  .perm-actions { display: flex; gap: 8px; }
  .perm-actions button { border: none; border-radius: 8px; padding: 7px 16px; font: inherit; font-size: 13px; font-weight: 600; cursor: pointer; }
  .perm-allow { background: #2f7a4a; color: #eafff1; }
  .perm-deny { background: #5a2a30; color: #ffd7db; }
  .perm-actions button:disabled { opacity: .5; cursor: default; }
  .perm-status { font-size: 13px; font-weight: 600; }
  .perm-status.allow { color: #7ee0a0; }
  .perm-status.deny { color: #ffb4bb; }

  /* token usage strip */
  #tokstrip {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    padding: 8px 16px; border-bottom: 1px solid var(--border); background: #14171d;
    font-size: 12px; color: var(--muted);
  }
  #tokstrip .lbl { color: var(--muted); }
  .tk-bar { flex: 1; min-width: 140px; max-width: 360px; height: 12px;
            background: var(--code); border: 1px solid var(--border); border-radius: 999px; overflow: hidden; }
  .tk-fill { height: 100%; width: 0%; background: #3fb950; border-radius: 999px; transition: width .35s ease, background .35s ease; }
  .tk-pct { font-family: Consolas, "Courier New", monospace; color: var(--text); min-width: 128px; }
  .tk-cum { font-family: Consolas, "Courier New", monospace; margin-left: auto; cursor: help; }

  #log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .msg { max-width: 80%; padding: 12px 14px; border-radius: 12px; line-height: 1.65; word-break: break-word; font-size: 14px; }
  .msg.user { background: var(--user); align-self: flex-end; border-top-right-radius: 3px; white-space: pre-wrap; }
  .msg.ai { background: var(--panel2); border: 1px solid var(--border); align-self: flex-start; border-top-left-radius: 3px; }
  .msg.sys { align-self: center; background: transparent; color: var(--muted); font-size: 12px; max-width: 90%; text-align: center; }
  .msg.err { align-self: flex-start; background: #3a1f24; border: 1px solid #5a2a30; color: #ffb4bb; white-space: pre-wrap; }

  .msg.ai > :first-child { margin-top: 0; } .msg.ai > :last-child { margin-bottom: 0; }
  .msg.ai p { margin: 0 0 8px; }
  .msg.ai ul, .msg.ai ol { margin: 6px 0; padding-left: 22px; }
  .msg.ai li { margin: 3px 0; }
  .msg.ai strong { color: #fff; font-weight: 700; }
  .msg.ai em { color: #d6c58a; font-style: italic; }
  .msg.ai code { background: var(--code); border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; font-family: Consolas, "Courier New", monospace; font-size: 13px; }
  .msg.ai pre { background: var(--code); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; overflow-x: auto; margin: 8px 0; }
  .msg.ai pre code { background: none; border: none; padding: 0; }
  .msg.ai h2, .msg.ai h3, .msg.ai h4 { margin: 12px 0 6px; font-size: 15px; line-height: 1.4; }
  .msg.ai blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 2px 12px; color: var(--muted); }
  .msg.ai a { color: var(--accent); }
  .msg.ai hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  .typing { display: inline-flex; gap: 4px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s } .typing span:nth-child(3){ animation-delay:.4s }
  @keyframes blink { 0%,60%,100%{opacity:.25} 30%{opacity:1} }

  footer { border-top: 1px solid var(--border); padding: 12px; background: var(--panel); }
  .modelrow { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .modelrow .lbl { font-size: 12px; color: var(--muted); }
  select#model {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 4px 8px; font: inherit; font-size: 12px;
  }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  textarea {
    flex: 1; resize: none; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px;
    font: inherit; font-size: 14px; line-height: 1.5; max-height: 160px; min-height: 44px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  button.send {
    background: var(--accent); color: #08111f; border: none; border-radius: 10px;
    padding: 0 18px; height: 44px; font-weight: 600; cursor: pointer; font-size: 14px;
  }
  button.send:disabled { opacity: .5; cursor: default; }

  /* memory-log viewer / editor modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay[hidden] { display: none; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 560px; max-height: 90vh; display: flex; flex-direction: column;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
  }
  .modal-head {
    display: flex; align-items: center; gap: 10px; padding: 13px 16px;
    border-bottom: 1px solid var(--border); font-size: 15px; font-weight: 600;
  }
  .modal-head .spacer { flex: 1; }
  .modal-desc { padding: 12px 16px 0; font-size: 12px; color: var(--muted); line-height: 1.55; }
  .modal-desc b { color: var(--text); font-weight: 600; }
  #memText {
    margin: 12px 16px; flex: 1; min-height: 220px; resize: vertical;
    background: var(--code); color: var(--text); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; font-family: Consolas, "Courier New", monospace;
    font-size: 13px; line-height: 1.6;
  }
  #memText:focus { outline: none; border-color: var(--accent); }
  #memText:disabled { opacity: .6; }
  .modal-actions {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .modal-actions .spacer { flex: 1; }
  .mem-status { font-size: 12px; color: var(--muted); }
  .mem-status.ok { color: #7ee0a0; }
  .mem-status.err { color: #ffb4bb; }
  .btn-primary {
    background: var(--accent); color: #08111f; border: none; border-radius: 8px;
    padding: 8px 18px; font: inherit; font-weight: 600; font-size: 13px; cursor: pointer;
  }
  .btn-primary:disabled { opacity: .5; cursor: default; }
  .btn-danger {
    background: #3a1f24; color: #ffd7db; border: 1px solid #5a2a30; border-radius: 8px;
    padding: 8px 14px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .btn-danger:hover { border-color: #f85149; }
  .btn-danger:disabled { opacity: .5; cursor: default; }
</style>
</head>
<body>
  <header>
    <span class="dot"></span>
    <h1>ToDoChat</h1>
    <span class="ver" id="ver" title="アプリのバージョン（括弧内はコミット。+は未コミットの変更あり）"></span>
    <div class="projwrap">
      <span class="lbl">📁</span>
      <select id="proj" title="開発対象フォルダ"></select>
      <button class="iconbtn" id="addProj" title="フォルダを追加">＋</button>
      <button class="iconbtn" id="delProj" title="一覧から削除（フォルダは消えません）">🗑</button>
      <button class="iconbtn" id="memBtn" title="記憶ログ（引き継ぎメモ）を表示・編集">🧠</button>
      <button class="iconbtn" id="modelsBtn" title="使用モデル記録（コミット時に参照する貢献モデル）を表示・編集">🏷️</button>
    </div>
    <span class="spacer"></span>
    <div class="modewrap">
      <select id="mode" title="AIに許可する操作の範囲">
        <option value="advisory">🔒 助言のみ</option>
        <option value="edit">✏️ 編集</option>
        <option value="confirm" selected>▶️ 実行（都度確認）</option>
      </select>
    </div>
    <button class="pilltoggle" id="autoRemBtn" title="ウィンドウ終了時に、現在の状態を自動で記憶ログへ保存します（次回起動時に引き継がれます）">💾 終了時記憶<span class="sw" id="autoRemState">OFF</span></button>
    <button class="pilltoggle" id="fullLogBtn" title="次回起動時、要約メモではなく前回の会話ログ全体を復元して再開します（深掘り作業向け）。毎ターン全履歴を再送するためトークン消費が大きくなります。">📜 フルログ復元<span class="sw" id="fullLogState">OFF</span></button>
    <button class="pilltoggle" id="startupBtn" title="Windowsサインイン時にToDoChatを自動起動します（タスクスケジューラに登録）。">🚀 スタートアップ登録<span class="sw" id="startupState">…</span></button>
    <span class="status" id="status">起動中…</span>
    <button class="iconbtn quit" id="quitBtn" title="ToDoChatを終了（サーバーを停止してウィンドウを閉じます）">✕</button>
  </header>

  <div id="tokstrip">
    <span class="lbl">コンテキスト使用量</span>
    <div class="tk-bar"><div class="tk-fill" id="ctxFill"></div></div>
    <span class="tk-pct" id="ctxPct">—</span>
    <span class="tk-cum" id="cumTxt" title="このセッションの累計トークン使用量">累計 —</span>
  </div>

  <div id="log"></div>
  <footer>
    <div class="modelrow">
      <span class="lbl">モデル</span>
      <select id="model" title="送信するメッセージに使うモデル">
        <option value="opus">Opus（高性能）</option>
        <option value="sonnet" selected>Sonnet（バランス）</option>
        <option value="haiku">Haiku（高速）</option>
      </select>
    </div>
    <div class="row">
      <textarea id="input" placeholder="返信を入力（Enter送信 / Shift+Enter改行 / /remember で記憶を保存 / /clear で消去）" disabled></textarea>
      <button class="send" id="send" disabled>送信</button>
    </div>
  </footer>

  <div id="memModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-head">
        <span>🧠 記憶ログ（引き継ぎメモ）</span>
        <span class="spacer"></span>
        <button class="iconbtn" id="memClose" title="閉じる">✕</button>
      </div>
      <div class="modal-desc">
        <b id="memProj">—</b> の記憶ログです。<b>アプリ再起動後の第一声</b>でAIに引き継がれます。
        自由に編集できます。<b>空にして保存すると削除</b>されます（バックアップは <code>.todochat/trash</code> に保持）。
      </div>
      <textarea id="memText" placeholder="（このフォルダの記憶ログはまだありません）" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn-danger" id="memDelete">削除</button>
        <span class="spacer"></span>
        <span class="mem-status" id="memStatus"></span>
        <button class="btn-primary" id="memSave">保存</button>
      </div>
    </div>
  </div>

  <div id="modelsModal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-head">
        <span>🏷️ 使用モデル記録</span>
        <span class="spacer"></span>
        <button class="iconbtn" id="modelsClose" title="閉じる">✕</button>
      </div>
      <div class="modal-desc">
        <b id="modelsProj">—</b> で<b>設計・実装（ファイル編集）を行ったモデル</b>の記録です。
        <b>git commit 時にコミットメッセージへ自動で反映</b>され、コミット後にクリアされます。
        1行に1モデルで自由に編集できます（例: <code>Opus 4.8</code>）。<b>空にして保存すると削除</b>されます。
      </div>
      <textarea id="modelsText" placeholder="（このフォルダの使用モデル記録はまだありません）" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn-danger" id="modelsDelete">削除</button>
        <span class="spacer"></span>
        <span class="mem-status" id="modelsStatus"></span>
        <button class="btn-primary" id="modelsSave">保存</button>
      </div>
    </div>
  </div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');
const projSel = document.getElementById('proj');
const modeSel = document.getElementById('mode');
let busy = false;

const MODE_TITLES = {
  advisory: 'Read/Glob/Grepのみ（ファイル編集・コマンド実行なし）',
  edit: '作業フォルダ内のファイル編集(Edit/Write)を許可。シェル実行(Bash)は無効。フォルダ外への書込は拒否。',
  confirm: 'ファイル編集に加え、シェル/アプリ実行(Bash)を1コマンドずつ許可を求めて実行。フォルダ外への書込は拒否。',
};
function currentMode(){ return modeSel.value; }
function updateModeStyle(){
  modeSel.classList.remove('edit', 'confirm');
  if (modeSel.value === 'edit') modeSel.classList.add('edit');
  else if (modeSel.value === 'confirm') modeSel.classList.add('confirm');
  modeSel.title = MODE_TITLES[modeSel.value] || '';
}
modeSel.addEventListener('change', updateModeStyle);
updateModeStyle();

// ---- auto-remember-on-close toggle ----
// When ON, closing the window (✕ button or closing the app window) makes the
// server snapshot the current state into the memory note before it exits. The
// state is persisted server-side (projects.json), so it restores on next launch.
const autoRemBtn = document.getElementById('autoRemBtn');
const autoRemState = document.getElementById('autoRemState');
let autoRemember = false;
function renderAutoRemember(){
  autoRemBtn.classList.toggle('on', autoRemember);
  autoRemState.textContent = autoRemember ? 'ON' : 'OFF';
}
async function toggleAutoRemember(){
  const next = !autoRemember;
  autoRemBtn.disabled = true;
  try {
    const r = await api('/api/auto-remember', { enabled: next });
    if (r.ok) autoRemember = !!r.enabled;
  } catch(_){}
  renderAutoRemember();
  autoRemBtn.disabled = false;
}
autoRemBtn.addEventListener('click', toggleAutoRemember);
renderAutoRemember();

// ---- full-log restore toggle ----
// When ON, the NEXT launch resumes the whole prior conversation (via the CLI's
// saved transcript) instead of the compact memory note -- heavier on tokens, so
// it's opt-in and default OFF. Global (one setting for all folders), persisted
// server-side (projects.json), so it restores its last state on next launch.
const fullLogBtn = document.getElementById('fullLogBtn');
const fullLogState = document.getElementById('fullLogState');
let fullLog = false;
function renderFullLog(){
  fullLogBtn.classList.toggle('on', fullLog);
  fullLogState.textContent = fullLog ? 'ON' : 'OFF';
}
async function toggleFullLog(){
  const next = !fullLog;
  fullLogBtn.disabled = true;
  try {
    const r = await api('/api/full-log', { enabled: next });
    if (r.ok) fullLog = !!r.enabled;
  } catch(_){}
  renderFullLog();
  fullLogBtn.disabled = false;
}
fullLogBtn.addEventListener('click', toggleFullLog);
renderFullLog();

// ---- Windows startup registration (Task Scheduler, log-on trigger) ----
// Unlike auto-remember/full-log this isn't an app-side flag: it reflects the
// actual OS registration state, so it's queried fresh on load rather than
// restored from projects.json.
const startupBtn = document.getElementById('startupBtn');
const startupState = document.getElementById('startupState');
let startupRegistered = false;
function renderStartup(){
  startupBtn.classList.toggle('on', startupRegistered);
  startupState.textContent = startupRegistered ? 'ON' : 'OFF';
}
async function loadStartupStatus(){
  try {
    const r = await api('/api/startup/status', null, 'GET');
    if (r.ok) startupRegistered = !!r.registered;
  } catch(_){}
  renderStartup();
}
async function toggleStartup(){
  const endpoint = startupRegistered ? '/api/startup/unregister' : '/api/startup/register';
  startupBtn.disabled = true;
  const prev = startupState.textContent;
  startupState.textContent = '…';   // UAC prompt may take a moment
  try {
    const r = await api(endpoint, {});
    if (r.ok) startupRegistered = !!r.registered;
    else if (!r.cancelled) alert(r.error || '操作に失敗しました。');
    // r.cancelled (user dismissed the UAC dialog): leave state unchanged, no alert.
  } catch(_){ alert('操作に失敗しました。'); }
  renderStartup();
  startupBtn.disabled = false;
}
startupBtn.addEventListener('click', toggleStartup);
startupState.textContent = '…';

// ---- token usage ----
const totals = { prompt: 0, out: 0, cacheR: 0, cacheC: 0, cost: 0 };
function fmt(n){ return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n); }
function barColor(pct){ return pct < 50 ? '#3fb950' : (pct < 80 ? '#d29922' : '#f85149'); }
function addUsage(u){
  if (!u) return;
  // context bar = this turn's prompt tokens / model context window
  const ctx = u.context_window || 200000;
  const pct = Math.max(0, Math.min(100, (u.prompt_tokens || 0) / ctx * 100));
  const fill = document.getElementById('ctxFill');
  fill.style.width = pct.toFixed(1) + '%';
  fill.style.background = barColor(pct);
  document.getElementById('ctxPct').textContent =
    `${pct.toFixed(1)}%  (${fmt(u.prompt_tokens||0)} / ${fmt(ctx)})`;

  // cumulative session totals
  totals.prompt += u.prompt_tokens || 0;
  totals.out += u.output_tokens || 0;
  totals.cacheR += u.cache_read_input_tokens || 0;
  totals.cacheC += u.cache_creation_input_tokens || 0;
  totals.cost += u.cost_usd || 0;
  const cum = document.getElementById('cumTxt');
  cum.textContent = `累計 ⬆${fmt(totals.prompt)} ⬇${fmt(totals.out)} · ~$${totals.cost.toFixed(3)}`;
  cum.title =
    `セッション累計トークン使用量\n` +
    `　入力(プロンプト計): ${totals.prompt.toLocaleString()}\n` +
    `　出力: ${totals.out.toLocaleString()}\n` +

// ---- minimal, XSS-safe markdown renderer ----
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inlineMd(s){
  s = escapeHtml(s);
  s = s.replace(/`([^`]+)`/g, (_, c) => '<code>'+c+'</code>');
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  return s;
}
function renderMarkdown(src){
  const lines = src.split('\n');
  const out = []; let i = 0, listType = null, para = [];
  const closeList = () => { if (listType){ out.push(listType==='ul'?'</ul>':'</ol>'); listType=null; } };
  const flushPara = () => { if (para.length){ out.push('<p>'+inlineMd(para.join(' '))+'</p>'); para=[]; } };
  while (i < lines.length){
    const line = lines[i];
    if (/^```/.test(line)){
      flushPara(); closeList(); const buf = []; i++;
      while (i < lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; out.push('<pre><code>'+escapeHtml(buf.join('\n'))+'</code></pre>'); continue;
    }
    if (/^\s*$/.test(line)){ flushPara(); closeList(); i++; continue; }
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h){ flushPara(); closeList(); const lvl = Math.min(h[1].length+1,6); out.push('<h'+lvl+'>'+inlineMd(h[2])+'</h'+lvl+'>'); i++; continue; }
    if (/^\s*([-*_])(\s*\1){2,}\s*$/.test(line)){ flushPara(); closeList(); out.push('<hr>'); i++; continue; }
    const ul = line.match(/^\s*[-*+]\s+(.*)$/);
    if (ul){ flushPara(); if (listType!=='ul'){ closeList(); out.push('<ul>'); listType='ul'; } out.push('<li>'+inlineMd(ul[1])+'</li>'); i++; continue; }
    const ol = line.match(/^\s*\d+[.)]\s+(.*)$/);
    if (ol){ flushPara(); if (listType!=='ol'){ closeList(); out.push('<ol>'); listType='ol'; } out.push('<li>'+inlineMd(ol[1])+'</li>'); i++; continue; }
    const bq = line.match(/^>\s?(.*)$/);
    if (bq){ flushPara(); closeList(); out.push('<blockquote>'+inlineMd(bq[1])+'</blockquote>'); i++; continue; }
    closeList(); para.push(line); i++;
  }
  flushPara(); closeList();
  return out.join('\n');
}

// ---- chat UI ----
function bubble(text, cls){
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  if (cls === 'ai') el.innerHTML = renderMarkdown(text); else el.textContent = text;
  log.appendChild(el); log.scrollTop = log.scrollHeight; return el;
}

    denials.map(d => (d && (d.tool_name || d.reason)) || JSON.stringify(d)).join(' / ');

function setBusy(b){

  statusEl.textContent = b ? '考え中…' : '待機中';

// Approval card for confirm mode: shows the exact command and waits for the
// user to allow/deny, posting the decision back so the paused command resumes.
function permissionCard(ev){
  const card = document.createElement('div');
  card.className = 'perm-card';
  const head = document.createElement('div');
  head.className = 'perm-head';
  head.textContent = ev.tool === 'Bash' ? '▶️ このコマンドを実行しますか？' : `▶️ ${ev.tool} を許可しますか？`;
  const cmd = document.createElement('pre');
  cmd.className = 'perm-cmd';
  cmd.textContent = ev.command || JSON.stringify(ev.input || {}, null, 2);   // textContent = XSS-safe
  // Safe read-only command (git log/status, head, echo, ...): the server has
  // already auto-approved it. Show the card for visibility, no buttons to click.
  if (ev.auto){
    head.textContent = '🛡️ 安全な操作を自動実行';
    const st = document.createElement('div');
    st.className = 'perm-status allow';
    st.textContent = '✅ 安全な操作として自動許可しました';
    card.append(head, cmd, st);
    log.appendChild(card); log.scrollTop = log.scrollHeight;
    return;
  }
  // Manual approval: annotate WHAT the command does and WHY (the CLI's own
  // description of its intent), so the decision isn't made off the raw line alone.
  let desc = null;
  if ((ev.desc || '').trim()){
    desc = document.createElement('div');
    desc.className = 'perm-desc';
    const label = document.createElement('b'); label.textContent = '意図・処理内容: ';
    desc.append(label, document.createTextNode(ev.desc.trim()));   // textContent-safe
  }
  const actions = document.createElement('div');
  actions.className = 'perm-actions';
  const allow = document.createElement('button'); allow.className = 'perm-allow'; allow.textContent = '許可';
  const deny = document.createElement('button'); deny.className = 'perm-deny'; deny.textContent = '拒否';
  actions.append(allow, deny);
  card.append(head);
  if (desc) card.append(desc);
  card.append(cmd, actions);
  log.appendChild(card); log.scrollTop = log.scrollHeight;
  statusEl.textContent = '許可待ち…';

  const decide = async (decision) => {
    allow.disabled = true; deny.disabled = true;
    try { await api('/api/permission-response', { id: ev.id, decision }); } catch (_) {}
    const st = document.createElement('div');
    st.className = 'perm-status ' + decision;
    st.textContent = decision === 'allow' ? '✅ 許可しました' : '⛔ 拒否しました';
    actions.replaceWith(st);
    statusEl.textContent = '考え中…';
  };
  allow.onclick = () => decide('allow');
  deny.onclick = () => decide('deny');
}
async function api(path, payload, method){
  const opt = { method: method || 'POST', headers: { 'Content-Type': 'application/json' } };
  if (opt.method === 'POST') opt.body = JSON.stringify(payload || {});
  const res = await fetch(path, opt);
  return res.json();
}

// Streams newline-delimited JSON events from the server as they arrive
// (real-time reply text) and calls onEvent for each parsed line.
async function apiStream(path, payload, onEvent){
  const res = await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload || {}) });
  const reader = res.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buf = '';
  while (true){
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf('\n')) >= 0){
      const line = buf.slice(0, idx); buf = buf.slice(idx + 1);
      if (!line.trim()) continue;
      try { onEvent(JSON.parse(line)); } catch (_) {}
    }
  }
  if (buf.trim()){ try { onEvent(JSON.parse(buf)); } catch (_) {} }
}

// ---- init / send ----
const modelSel = document.getElementById('model');

// Drives one streamed request. The reply can arrive in multiple text segments
// separated by approval cards (confirm mode): each segment grows live as plain
// text, then settles into rendered Markdown when the segment ends (a permission
// request or the final event). `live` is the current bubble -- typing dots
// until the first text chunk, then a text bubble.
// The AI may append a [[TODOCHAT_MEMORY]]...[[/TODOCHAT_MEMORY]] block that the
// server saves as the cross-restart hand-off note. It must never be shown, so
// hide everything from the start marker onward while streaming (the server also
// strips it from the final reply).
function stripMemory(s){ const i = s.indexOf('[[TODOCHAT_MEMORY]]'); return i >= 0 ? s.slice(0, i).replace(/\s+$/, '') : s; }
async function streamedTurn(path, payload, onFail){
  let live = null, liveIsText = false, liveText = '', final = null;
  function ensureTyping(){ if (!live){ live = typingBubble(); liveIsText = false; } }
  function textTarget(){
    if (!live){ live = document.createElement('div'); live.className = 'msg ai'; log.appendChild(live); }
    if (!liveIsText){ live.innerHTML = ''; liveIsText = true; liveText = ''; }
    return live;
  }
  function finalizeLive(){
    if (!live) return;
    const shown = stripMemory(liveText);
    if (liveIsText && shown.trim()) live.innerHTML = renderMarkdown(shown);
    else live.remove();
    live = null; liveIsText = false; liveText = '';
  }
  ensureTyping();
  try {
    await apiStream(path, payload, (ev) => {
      if (ev.type === 'delta'){
        const t = textTarget();
        liveText += ev.text; t.textContent = stripMemory(liveText);
        log.scrollTop = log.scrollHeight;
      } else if (ev.type === 'permission_request'){
        finalizeLive();
        permissionCard(ev);
        ensureTyping();          // dots while the (approved) command runs / reply continues
      } else if (ev.type === 'notice'){
        // A server-side status note mid-stream (e.g. full-log restore fell back
        // to a fresh greeting). Show it as a sys bubble before the reply resumes.
        finalizeLive();
        bubble(ev.text, ev.cls || 'sys');
        ensureTyping();
      } else if (ev.type === 'final'){
        final = ev;
      }
    });
  } catch (e){
    finalizeLive(); onFail('通信エラー: ' + e); return null;
  }
  // No text streamed (e.g. tool-only turn) but a final reply exists -> show it.
  if (final && final.ok && !liveIsText && final.reply && final.reply.trim()){
    textTarget().textContent = final.reply; liveText = final.reply;
  }
  finalizeLive();
  if (final && final.ok){
    addUsage(final.usage);
    showDenials(final.usage && final.usage.permission_denials);
  } else if (final && final.error){
    onFail(final.error);
  } else {
    // No 'final' event ever arrived -> the stream was cut off before the server
    // could report a result (server crash / killed process / dropped socket).
    onFail('サーバーからの応答が途中で切断されました。'
         + 'サーバー(start.bat)のウィンドウにエラー内容が表示されている場合があります。');
  }
  return final;
}
async function init(){
  setBusy(true);
  await streamedTurn('/api/init', { model: modelSel.value, mode: currentMode() },
    (msg) => bubble('起動時の応答取得に失敗しました:\n' + msg, 'err'));
  setBusy(false);
}
// /clear (like the Claude app): forget this project's chat continuity and its
// memory note, then wipe the visible log. A backup of the note is kept server-
// side in .todochat/trash (never re-read, so it costs no tokens).
async function clearHistory(){
  setBusy(true);
  try {
    const r = await api('/api/clear', {});
    log.innerHTML = ''; resetContextBar();
    const note = (r && r.cleared_memory)
      ? 'チャット履歴と記憶ログを削除しました。（バックアップは .todochat/trash に保持）'
      : 'チャット履歴を削除しました。（記憶ログはありませんでした）';
    bubble(note, 'sys');
    bubble('新しい会話を始められます。挨拶を表示するにはウィンドウを再読み込みしてください。', 'sys');
  } catch (e){ bubble('削除に失敗しました: ' + e, 'err'); }
  setBusy(false);
}
// /remember: force a manual snapshot of the current state into the memory note
// right now (normally the AI decides on its own whether to save one). The reply
// is block-only, so nothing streams into the chat; we confirm with a sys note
// and echo the saved summary so the user can see exactly what was captured.
async function rememberSnapshot(){
  bubble('/remember', 'user');
  setBusy(true);
  const final = await streamedTurn('/api/remember', { model: modelSel.value },
    (msg) => bubble('スナップショットの保存に失敗しました:\n' + msg, 'err'));
  if (final && final.ok){
    if (final.remembered){
      bubble('📌 現在の状態を記憶ログに保存しました。次回起動時に引き継がれます。', 'sys');
      if (final.memory && final.memory.trim()){
        const el = document.createElement('div');
        el.className = 'msg ai';
        el.innerHTML = '<div style="font-size:12px;color:var(--muted);margin-bottom:6px;">保存した記憶ログ</div>'
                     + renderMarkdown(final.memory);
        log.appendChild(el); log.scrollTop = log.scrollHeight;
      }
    } else {
      bubble('記憶すべき進行中の状態が見つからなかったため、保存しませんでした。', 'sys');
    }
  }
  setBusy(false);
}
// ---- memory-log viewer / editor (🧠 button) ----
// Read/edit the current project's cross-restart hand-off note by hand. Saving
// backs the old note up to .todochat/trash first (server side); clearing the box
// and saving deletes the note. Edits take effect on the NEXT launch's greeting,
// not the live conversation (the note is a restart hand-off, not chat context).
const memModal = document.getElementById('memModal');
const memText = document.getElementById('memText');
const memStatus = document.getElementById('memStatus');
const memSaveBtn = document.getElementById('memSave');
const memDelBtn = document.getElementById('memDelete');
function setMemStatus(msg, cls){ memStatus.className = 'mem-status' + (cls ? ' ' + cls : ''); memStatus.textContent = msg || ''; }
function memBusy(b){ memText.disabled = b; memSaveBtn.disabled = b; memDelBtn.disabled = b; }
async function openMemory(){
  const opt = projSel.options[projSel.selectedIndex];
  document.getElementById('memProj').textContent = opt ? opt.textContent : '現在のフォルダ';
  memText.value = ''; setMemStatus('読み込み中…'); memBusy(true);

    else setMemStatus(r.error || '読み込みに失敗しました', 'err');

}

async function deleteMemory(){

}

const modelsStatus = document.getElementById('modelsStatus');
const modelsSaveBtn = document.getElementById('modelsSave');
const modelsDelBtn = document.getElementById('modelsDelete');

function modelsBusy(b){ modelsText.disabled = b; modelsSaveBtn.disabled = b; modelsDelBtn.disabled = b; }

async function send(){
  const text = input.value.trim();
  if (!text || busy) return;
  if (text === '/clear'){ input.value = ''; input.style.height = 'auto'; await clearHistory(); return; }
  if (text === '/remember'){ input.value = ''; input.style.height = 'auto'; await rememberSnapshot(); return; }
  const model = modelSel.value;   // captured at send time, per message
  const mode = currentMode();
  input.value = ''; input.style.height = 'auto';
  bubble(text, 'user'); setBusy(true);
  await streamedTurn('/api/chat', { message: text, model, mode }, (msg) => bubble(msg, 'err'));
  setBusy(false);
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 160) + 'px'; });
sendBtn.addEventListener('click', send);

// ---- auto-shutdown on window close + manual 終了 button ----
// While this page is open it heartbeats /api/alive. On window close we beacon
// /api/shutdown; the server then quits after a short grace period. A reload also
// fires unload, but the freshly loaded page's heartbeat cancels that shutdown,
// so only an actual close stops the server.
let quitting = false;
function beaconShutdown(){
  if (quitting) return;                         // 終了 button already stopped it
  try { navigator.sendBeacon('/api/shutdown'); } catch (_) {}
}
window.addEventListener('pagehide', beaconShutdown);
window.addEventListener('beforeunload', beaconShutdown);
function heartbeat(){ api('/api/alive', {}).catch(() => {}); }
heartbeat();                                     // cancels a reload-armed shutdown
setInterval(heartbeat, 4000);

document.getElementById('quitBtn').addEventListener('click', async () => {
  if (!confirm('ToDoChatを終了しますか？\nサーバーを停止し、ウィンドウを閉じます。')) return;
  quitting = true;
  // When auto-remember is on the server snapshots memory before replying, so the
  // await below can take a few seconds -- tell the user what's happening.
  statusEl.textContent = autoRemember ? '記憶を保存して終了中…' : '終了中…';
  try { await api('/api/quit', {}); } catch (_) {}
  statusEl.textContent = '終了しました';
  window.close();                                // closes the --app window if allowed
  // If the browser refused window.close(), leave a clear notice behind.
  document.body.innerHTML =
    '<div style="height:100vh;display:flex;align-items:center;justify-content:center;'
    + 'color:#9aa1ad;font:15px system-ui,sans-serif;text-align:center;padding:24px;">'
    + 'ToDoChatを終了しました。<br>サーバーは停止済みです。このウィンドウを閉じて構いません。</div>';
});
